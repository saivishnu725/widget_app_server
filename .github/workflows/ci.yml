name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: widget_user
          POSTGRES_PASSWORD: widget_password
          POSTGRES_DB: widget_app_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint
      continue-on-error: true

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Push Schema to DB
      run: npx prisma db push
      env:
        DATABASE_URL: postgresql://widget_user:widget_password@localhost:5432/widget_app_db

    - name: Run Tests
      run: npm test
      env:
        DATABASE_URL: postgresql://widget_user:widget_password@localhost:5432/widget_app_db
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test_secret

    - name: Build TypeScript
      run: npm run build

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Image
      run: docker build -t widget_app_server:latest .
